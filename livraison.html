<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier & Livraison - Longrich</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        #map {
            height: 350px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1; /* S'assurer qu'elle est en dessous du header si besoin */
        }
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .location-info {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-left: 5px solid #ffeeba;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Longrich <span>Bio</span></a>
        <nav>
            <ul>
                <li><a href="index.html">← Continuer vos achats</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" style="margin-top:2rem; max-width:800px;">
        
        <h2 style="text-align:center; margin-bottom:30px;">Finaliser votre commande</h2>

        <!-- Résumé Panier -->
        <div class="form-section">
            <h3><i class="fas fa-shopping-basket"></i> Votre Panier</h3>
            <div id="cart-items">Chargement...</div>
            <div style="text-align:right; font-size:1.3rem; font-weight:bold; margin-top:15px; color:var(--primary);">
                Total : <span id="cart-total">0 FCFA</span>
            </div>
        </div>

        <!-- Formulaire de Livraison -->
        <form id="checkout-form">
            
            <div class="form-section">
                <h3><i class="fas fa-user"></i> Vos Coordonnées</h3>
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="c-name" required placeholder="Ex: Jean Dupont">
                </div>
            </div>

            <div class="form-section">
                <h3><i class="fas fa-map-marked-alt"></i> Localisation Exacte</h3>
                <div class="location-info">
                    <i class="fas fa-info-circle"></i> 
                    Livreur perdu ? Plus jamais ! Déplacez la carte (vue Satellite) et cliquez sur votre toit.
                </div>
                
                <!-- Carte Leaflet -->
                <div id="map"></div>
                
                <!-- Coordonnées cachées -->
                <input type="hidden" id="c-lat">
                <input type="hidden" id="c-lng">

                <div class="form-group">
                    <label>Précisions (Quartier, Repère...)</label>
                    <textarea id="c-address" required rows="2" placeholder="Ex: Akwa, à côté de la pharmacie..."></textarea>
                </div>
            </div>
            
            <button type="submit" class="btn" style="background:#25D366; padding: 15px; font-size: 1.2rem; display:flex; justify-content:center; align-items:center; gap:10px;">
                <i class="fab fa-whatsapp" style="font-size:1.5rem;"></i> Confirmer sur WhatsApp
            </button>
        </form>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>

    <!-- Init Carte -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Vue initiale (Douala)
            const lat = 4.051056;
            const lng = 9.767869;
            
            const map = L.map('map').setView([lat, lng], 13);

            // Couche Satellite (Esri)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri',
                maxZoom: 18
            }).addTo(map);

            // Marqueur draggable
            const marker = L.marker([lat, lng], {draggable: true}).addTo(map);

            // Fonction update inputs
            function updateInputs(pos) {
                document.getElementById('c-lat').value = pos.lat.toFixed(6);
                document.getElementById('c-lng').value = pos.lng.toFixed(6);
            }
            // Init
            updateInputs({lat, lng});

            // Events
            marker.on('dragend', function(e) {
                updateInputs(e.target.getLatLng());
            });

            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                updateInputs(e.latlng);
            });

            // Géoloc
            if("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const userLat = pos.coords.latitude;
                    const userLng = pos.coords.longitude;
                    map.setView([userLat, userLng], 17);
                    marker.setLatLng([userLat, userLng]);
                    updateInputs({lat: userLat, lng: userLng});
                });
            }
        });
    </script>
</body>
</html>
